name: Bug report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which VTT module is this bug related to?
      options:
        # Add modules here
        - archetypes
        - barbarians
        - clerics
        - feats
        - firebrands
        - impossible-lands
        - inventors
        - magic
        - magnus
        - oracles
        - summoners
        - tian-xia
        - witches
        - wizards
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.

  - type: input
    id: foundry-version
    attributes:
      label: Foundry VTT version
      placeholder: "e.g. 13.351"
    validations:
      required: true

  - type: input
    id: system-version
    attributes:
      label: System version
      placeholder: "e.g. 7.10.1"
    validations:
      required: true

  - type: input
    id: module-version
    attributes:
      label: Module version
      placeholder: "e.g. 1.1.2"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
